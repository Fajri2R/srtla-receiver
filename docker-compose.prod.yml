services:
  sls-management-ui:
    image: ghcr.io/openirl/sls-management-ui:latest
    container_name: sls-management-ui
    restart: unless-stopped
    environment:
      REACT_APP_BASE_URL: "${APP_URL}"
      REACT_APP_SRT_PLAYER_PORT: "${SRT_PLAYER_PORT:-4000}"
      REACT_APP_SRT_SENDER_PORT: "${SRT_SENDER_PORT:-4001}"
      REACT_APP_SLS_STATS_PORT: "${SLS_STATS_PORT:-8080}"
      REACT_APP_SRTLA_PORT: "${SRTLA_PORT:-5000}"
    ports:
      - "${SLS_MGNT_PORT}:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  receiver:
    image: ghcr.io/openirl/srtla-receiver:latest
    container_name: srtla-receiver
    restart: unless-stopped
    ports:
      - "${SLS_STATS_PORT}:8080/tcp"
      - "${SRTLA_PORT}:5000/udp"
      - "${SRT_SENDER_PORT}:4001/udp"
      - "${SRT_PLAYER_PORT}:4000/udp"
    volumes:
      - ./data:/var/lib/sls # Persistent storage for database
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Live Preview: HLS Transcoder ────────────────────────────────
  live-preview-hls:
    image: linuxserver/ffmpeg:latest
    container_name: live-preview-hls
    restart: unless-stopped
    depends_on:
      - receiver
    environment:
      - SRT_HOST=receiver
      - SRT_PORT=4000
      - HLS_PATH=/hls
      - STREAM_ID=${PREVIEW_STREAM_ID:-live/stream}
      - HLS_TIME=${HLS_SEGMENT_TIME:-2}
      - HLS_LIST_SIZE=${HLS_LIST_SIZE:-5}
    volumes:
      - hls-data:/hls
    entrypoint: >
      /bin/sh -c "
        mkdir -p /hls &&
        echo '=== Starting HLS transcoder ===' &&
        echo '=== SRT source: srt://receiver:4000?streamid=${PREVIEW_STREAM_ID:-live/stream} ===' &&
        ffmpeg -re
          -i 'srt://receiver:4000?streamid=${PREVIEW_STREAM_ID:-live/stream}&mode=caller'
          -c:v copy
          -c:a copy
          -f hls
          -hls_time ${HLS_SEGMENT_TIME:-2}
          -hls_list_size ${HLS_LIST_SIZE:-5}
          -hls_flags delete_segments+append_list
          -hls_segment_filename '/hls/stream_%03d.ts'
          /hls/stream.m3u8
        2>&1
      "
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Live Preview: Web Server ─────────────────────────────────────
  live-preview-nginx:
    image: nginx:alpine
    container_name: live-preview-nginx
    restart: unless-stopped
    depends_on:
      - receiver
    ports:
      - "${LIVE_PREVIEW_PORT:-8090}:80"
    volumes:
      - ./preview/index.html:/usr/share/nginx/html/index.html:ro
      - ./preview/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-data:/var/www/hls:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  hls-data:
    driver: local
