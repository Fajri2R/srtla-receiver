services:
  sls-management-ui:
    image: ghcr.io/openirl/sls-management-ui:latest
    container_name: sls-management-ui
    environment:
      REACT_APP_BASE_URL: "${APP_URL}"
      REACT_APP_SRT_PLAYER_PORT: "${SRT_PLAYER_PORT:-4000}"
      REACT_APP_SRT_SENDER_PORT: "${SRT_SENDER_PORT:-4001}"
      REACT_APP_SLS_STATS_PORT: "${SLS_STATS_PORT:-8080}"
      REACT_APP_SRTLA_PORT: "${SRTLA_PORT:-5000}"
    ports:
      - "${SLS_MGNT_PORT}:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  receiver:
    build: .
    container_name: srtla-receiver
    restart: unless-stopped
    environment:
      SRTLA_LOG_LEVEL: "${SRTLA_LOG_LEVEL:-info}"
    ports:
      - "${SLS_STATS_PORT:-8080}:8080/tcp"
      - "${SRTLA_PORT:-5000}:5000/udp"
      - "${SRT_SENDER_PORT:-4001}:4001/udp"
      - "${SRT_PLAYER_PORT:-4000}:4000/udp"
    volumes:
      - ./data:/var/lib/sls
    # ✅ FIX: Use wget (BusyBox, available on Alpine) instead of curl
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/stats 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Live Preview: Multi-stream HLS Manager ──────────────────────────────────
  hls-manager:
    build: ./hls-manager
    container_name: srtla-hls-manager
    restart: unless-stopped
    # ✅ FIX #11: Wait for receiver to be healthy before starting
    depends_on:
      receiver:
        condition: service_healthy
    environment:
      SLS_STATS_URL:  "http://receiver:8080/stats"
      SRT_HOST:       "receiver"
      SRT_PORT:       "4000"
      HLS_PATH:       "/hls"
      HLS_TIME:       "${HLS_SEGMENT_TIME:-2}"
      HLS_LIST_SIZE:  "${HLS_LIST_SIZE:-5}"
      POLL_INTERVAL:  "${HLS_POLL_INTERVAL:-5}"
      HEALTH_PORT:    "9090"
      MAX_RETRIES:    "${HLS_MAX_RETRIES:-10}"
    volumes:
      - hls-data:/hls
    # ✅ FIX #15: Healthcheck via the new /health endpoint
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Live Preview: Web Server ─────────────────────────────────────────────────
  live-preview:
    image: nginx:alpine
    container_name: srtla-live-preview
    restart: unless-stopped
    depends_on:
      - hls-manager
      - receiver
    ports:
      - "${LIVE_PREVIEW_PORT:-8090}:80"
    volumes:
      - ./preview/index.html:/usr/share/nginx/html/index.html:ro
      - ./preview/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-data:/var/www/hls:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  hls-data:
    driver: local