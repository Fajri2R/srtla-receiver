services:
  # ── Management UI — behind mgmt-proxy for Live Preview button injection ────────
  sls-management-ui:
    image: ghcr.io/openirl/sls-management-ui:latest
    container_name: sls-management-ui
    restart: unless-stopped
    environment:
      REACT_APP_BASE_URL: "${APP_URL}"
      REACT_APP_SRT_PLAYER_PORT: "${SRT_PLAYER_PORT:-4000}"
      REACT_APP_SRT_SENDER_PORT: "${SRT_SENDER_PORT:-4001}"
      REACT_APP_SLS_STATS_PORT: "${SLS_STATS_PORT:-8080}"
      REACT_APP_SRTLA_PORT: "${SRTLA_PORT:-5000}"
    # No direct port exposure — traffic goes through mgmt-proxy
    expose:
      - "3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Management UI Proxy — injects Live Preview floating button ────────────────
  # Sits in front of sls-management-ui and injects a "Live Preview" FAB via
  # nginx sub_filter, so users can jump to the preview page with one click.
  mgmt-proxy:
    image: nginx:alpine
    container_name: sls-mgmt-proxy
    restart: unless-stopped
    depends_on:
      - sls-management-ui
    ports:
      - "${SLS_MGNT_PORT}:80"
    volumes:
      - ./mgmt-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mgmt-proxy/lp-inject.js:/etc/nginx/lp-inject.js:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── SRT Receiver (SRTla + SLS) ────────────────────────────────────────────────
  receiver:
    build: .
    container_name: srtla-receiver
    restart: unless-stopped
    environment:
      SRTLA_LOG_LEVEL: "${SRTLA_LOG_LEVEL:-info}"
    ports:
      - "${SLS_STATS_PORT:-8080}:8080/tcp"
      - "${SRTLA_PORT:-5000}:5000/udp"
      - "${SRT_SENDER_PORT:-4001}:4001/udp"
      - "${SRT_PLAYER_PORT:-4000}:4000/udp"
    volumes:
      - ./data:/var/lib/sls
    # Healthcheck: nc (BusyBox netcat) — no curl/wget needed on Alpine
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── HLS Manager — polls SLS stats, spawns FFmpeg per active publisher ─────────
  hls-manager:
    build: ./hls-manager
    container_name: srtla-hls-manager
    restart: unless-stopped
    depends_on:
      receiver:
        condition: service_started
    environment:
      SLS_STATS_URL:   "http://receiver:8080/stats"
      # SLS REST API endpoints (OpenIRL fork)
      SLS_STREAMS_URL: "http://receiver:8080/api/stream-ids"
      # API key for /api/stream-ids auth (read from .apikey file or env var)
      SLS_API_KEY:     "${SLS_API_KEY}"
      SRT_HOST:        "receiver"
      SRT_PORT:        "4000"
      HLS_PATH:        "/hls"
      HLS_TIME:        "${HLS_SEGMENT_TIME:-2}"
      HLS_LIST_SIZE:   "${HLS_LIST_SIZE:-5}"
      POLL_INTERVAL:   "${HLS_POLL_INTERVAL:-5}"
      HEALTH_PORT:     "9090"
      MAX_RETRIES:     "${HLS_MAX_RETRIES:-10}"
    volumes:
      - hls-data:/hls
      - ./.apikey:/apikey:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9090/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Live Preview Web Server ───────────────────────────────────────────────────
  live-preview:
    image: nginx:alpine
    container_name: srtla-live-preview
    restart: unless-stopped
    depends_on:
      - hls-manager
      - receiver
    ports:
      - "${LIVE_PREVIEW_PORT:-8090}:80"
    volumes:
      - ./preview/index.html:/usr/share/nginx/html/index.html:ro
      - ./preview/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-data:/var/www/hls:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  hls-data:
    driver: local