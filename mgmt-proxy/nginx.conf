worker_processes 1;
error_log /dev/stderr warn;
pid       /var/run/nginx.pid;

events { worker_connections 512; }

http {
    access_log /dev/stdout;

    server {
        listen 80;
        server_name _;

        # Proxy to sls-management-ui container
        location / {
            proxy_pass         http://sls-management-ui:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # WebSocket support (for hot-reload / SSE)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;

            # ── Inject Live Preview FAB into every HTML page ──────────────
            # sub_filter replaces </body> with our button + </body>
            # The injected JS auto-detects hostname so IP never needs hardcoding.
            # Port 8090 = LIVE_PREVIEW_PORT default.
            sub_filter_once  on;
            sub_filter_types text/html;
            sub_filter '</body>' '
<style>
  #__lp-fab {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 2147483647;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #__lp-fab a {
    display: flex; align-items: center; gap: 9px;
    background: linear-gradient(135deg, #a855f7, #6366f1);
    color: #fff;
    padding: 13px 22px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .3px;
    box-shadow: 0 4px 22px rgba(99,102,241,.55);
    transition: transform .18s, box-shadow .18s;
  }
  #__lp-fab a:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(99,102,241,.75);
  }
  #__lp-fab svg { flex-shrink: 0; }
  #__lp-fab span { white-space: nowrap; }
</style>
<div id="__lp-fab">
  <a id="__lp-link__" href="#" target="_blank" title="Open SRTla Live Preview">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
               10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
    </svg>
    <span>Live Preview</span>
  </a>
</div>
<script>
  (function () {
    var port = 8090; // matches LIVE_PREVIEW_PORT default
    var a = document.getElementById("__lp-link__");
    if (a) a.href = location.protocol + "//" + location.hostname + ":" + port;
  })();
</script>
</body>';
        }
    }
}
