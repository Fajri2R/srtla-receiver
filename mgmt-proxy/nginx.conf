worker_processes 1;
error_log /dev/stderr warn;
pid       /var/run/nginx.pid;

events { worker_connections 512; }

http {
    access_log /dev/stdout;

    server {
        listen 80;
        server_name _;

        # Serve the Live Preview injector script (mounted from host)
        location = /lp-inject.js {
            alias /etc/nginx/lp-inject.js;
            add_header Cache-Control "no-cache, no-store";
            add_header Content-Type  "application/javascript; charset=utf-8";
        }

        location / {
            proxy_pass         http://sls-management-ui:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;

            # Inject Live Preview script tag before </body>
            # The JS file is served at /lp-inject.js by this same nginx.
            sub_filter_once  on;
            sub_filter_types text/html;
            sub_filter '</body>' '<script src="/lp-inject.js"></script></body>';
        }
    }
}
