worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    server {
        listen 80;
        server_name _;

        # ── Static preview app ────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── HLS segments — served from /hls/{stream_safe_id}/stream.m3u8 ─
        # The HLS manager writes files to /var/www/hls/{stream_safe_id}/
        location /hls/ {
            alias /var/www/hls/;

            # CORS — allow browser video requests from any origin
            add_header 'Access-Control-Allow-Origin'   '*'                 always;
            add_header 'Access-Control-Allow-Methods'  'GET, OPTIONS'      always;
            add_header 'Access-Control-Allow-Headers'  'Range'             always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Correct MIME types for HLS
            types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }

            # No cache on live playlists
            location ~* \.m3u8$ {
                add_header 'Cache-Control'             'no-cache, no-store, must-revalidate' always;
                add_header 'Pragma'                    'no-cache'          always;
                add_header 'Expires'                   '0'                 always;
                add_header 'Access-Control-Allow-Origin' '*'               always;
            }

            # Short cache on immutable segments
            location ~* \.ts$ {
                add_header 'Cache-Control' 'max-age=10' always;
                add_header 'Access-Control-Allow-Origin' '*' always;
            }
        }

        # ── SLS Stats API proxy ───────────────────────────────────────────
        # Avoids browser CORS issues; also lets the preview app resolve the
        # server-internal "receiver" hostname via nginx.
        location /api/stats {
            proxy_pass         http://receiver:8080/stats;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 5s;

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        }

        # ── Stream list helper ────────────────────────────────────────────
        # Returns a JSON array of stream IDs that have an active HLS playlist
        location = /api/streams {
            # We use autoindex JSON trick + nginx-extras — fallback is client-side
            # detection (HLS.js will 404 on missing .m3u8).
            # The preview app fetches /api/stats instead, which is richer.
            return 200 '[]';
            add_header Content-Type 'application/json';
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
    }
}
