worker_processes auto;
error_log /dev/stderr warn;   # ✅ FIX #16: log to Docker stdout/stderr, no unbounded file
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /dev/stdout main;  # ✅ FIX #16: log to stdout for docker logs

    # ✅ FIX #6: tcp_nopush + tcp_nodelay reduce HTTP latency for HLS segments
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    server {
        listen 80;
        server_name _;

        # ── Static preview SPA ────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── HLS segments — /hls/{safe_stream_id}/stream.m3u8 ─────────────
        location /hls/ {
            alias /var/www/hls/;

            # CORS for browser video requests
            add_header 'Access-Control-Allow-Origin'   '*'                          always;
            add_header 'Access-Control-Allow-Methods'  'GET, OPTIONS'               always;
            add_header 'Access-Control-Allow-Headers'  'Range'                      always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
                add_header 'Access-Control-Max-Age'       1728000;
                add_header 'Content-Length'               0;
                return 204;
            }

            # Correct MIME types for HLS
            types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }

            # Live playlist — never cache
            location ~* \.m3u8$ {
                add_header 'Cache-Control'              'no-cache, no-store, must-revalidate' always;
                add_header 'Pragma'                     'no-cache'                            always;
                add_header 'Expires'                    '0'                                   always;
                add_header 'Access-Control-Allow-Origin' '*'                                  always;
            }

            # Segments are immutable once written — short cache is fine
            location ~* \.ts$ {
                add_header 'Cache-Control'              'max-age=10'  always;
                add_header 'Access-Control-Allow-Origin' '*'          always;
            }
        }

        # ── SLS Stats API proxy ───────────────────────────────────────────
        # Resolves the internal "receiver" hostname — no CORS issue from browser
        location /api/stats {
            proxy_pass         http://receiver:8080/stats;
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_read_timeout 5s;
            proxy_connect_timeout 3s;

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        }

        # ── HLS Manager health/status proxy ──────────────────────────────
        # ✅ FIX #15: Expose hls-manager health at /api/hls-status
        location /api/hls-status {
            proxy_pass         http://hls-manager:9090/health;
            proxy_read_timeout 3s;
            proxy_connect_timeout 2s;

            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        }
    }
}
