worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    server {
        listen 80;
        server_name _;

        # ── Static preview app ────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── HLS segments served from /hls/ path ───────────────────
        location /hls/ {
            alias /var/www/hls/;

            # CORS – allow browser video requests from any origin
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

            # Correct MIME types for HLS
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }

            # Disable caching for live playlist files
            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma no-cache;
                add_header Expires 0;
                add_header 'Access-Control-Allow-Origin' '*' always;
            }

            # Short cache for segments (they are immutable once written)
            location ~* \.ts$ {
                add_header Cache-Control "max-age=10";
                add_header 'Access-Control-Allow-Origin' '*' always;
            }
        }

        # ── SLS Stats API proxy (avoids CORS issues from browser) ──
        location /api/stats {
            # Proxy to the SLS stats port inside Docker network
            proxy_pass http://receiver:8080/stats;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        }
    }
}
